<style>
  @font-face{font-family:'KoddiUD OnGothic';src:local('KoddiUD OnGothic');}
  *{box-sizing:border-box;}
  body{margin:0;background:#f7f8fa;color:#1a1a1a;
       font-family:'KoddiUD OnGothic','Apple SD Gothic Neo','Noto Color Emoji',sans-serif;}
  .wrap{max-width:1560px;margin:0 auto;padding:36px 20px 40px;}
  .banner{max-width:1000px;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;
          background:#eef4ff;border:1px solid #d6e4ff;border-radius:10px;padding:12px 18px;}
  .banner-link{color:#3b82f6;font-weight:700;font-size:14px;text-decoration:none;white-space:nowrap;}
  .banner-link:hover{text-decoration:underline;}
  .banner-desc{color:#444;font-size:13.5px;}
  h1{font-size:24px;font-weight:800;margin:0 0 4px;}
  p.sub{color:#555;font-size:14px;margin:0 0 20px;}
  .layout{display:flex;gap:22px;align-items:flex-start;}
  .chartcol{flex:1 1 auto;min-width:0;}
  #chart-container{width:100%;max-width:1040px;}
  #chart-container svg{width:100%;height:auto;}
  /* 상세 패널 */
  .panel{flex:0 0 360px;width:360px;background:#fff;border:1px solid #e8eaed;border-radius:16px;
         padding:20px;position:sticky;top:20px;max-height:calc(100vh - 40px);overflow-y:auto;
         box-shadow:0 4px 18px rgba(0,0,0,.05);}   /* 데스크톱: 뷰포트 높이 제한 + 내부 스크롤 */
  .panel .panel-empty{color:#9aa0a6;font-size:14px;text-align:center;padding:60px 10px;line-height:1.6;}
  .bk-head{display:flex;gap:14px;}
  .bk-head img{width:96px;height:auto;border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,.18);flex:0 0 96px;}
  .bk-title{font-size:18px;font-weight:800;line-height:1.3;margin:0 0 4px;}
  .bk-sub{font-size:13px;color:#666;line-height:1.4;margin:0 0 8px;}
  .bk-meta{font-size:13px;color:#333;line-height:1.7;}
  .bk-meta b{color:#111;}
  .bk-cat{display:inline-block;margin-top:8px;font-size:11.5px;color:#5f6368;background:#f1f3f4;
          border-radius:20px;padding:3px 10px;}
  .bk-link{display:inline-block;margin-top:10px;font-size:12.5px;color:#3b82f6;text-decoration:none;font-weight:600;}
  .bk-link:hover{text-decoration:underline;}
  .divider{border:0;border-top:1px solid #eceef0;margin:16px 0;}
  .rec-h{font-size:14px;font-weight:800;margin:0 0 12px;color:#111;}
  .rec-h .cnt{color:#3b82f6;}
  .rec{margin:0 0 14px;padding:0 0 14px;border-bottom:1px dashed #eceef0;}
  .rec:last-child{border-bottom:0;margin-bottom:0;padding-bottom:0;}
  .rec-name{font-size:14px;font-weight:700;color:#1a1a1a;}
  .rec-bio{font-size:11.5px;color:#8a8f96;line-height:1.5;margin:2px 0 6px;}
  .rec-review{font-size:13px;color:#33373c;line-height:1.62;}
  .rec-review.empty{color:#b8bcc1;font-size:12px;}
  #chart-container svg path.rootArea{cursor:pointer;}
  #chart-container svg path.rootArea:hover{filter:brightness(.94);}
  #chart-container svg path.cell-clicked{stroke:#111;stroke-width:2.5px;filter:brightness(.92);}
  /* 필터(회색 처리) */
  #chart-container svg text.dimmed-label{opacity:.1;}
  #chart-container svg.filtering path.cell-clicked{stroke:none;}

  b.filter-trig:hover{color:#3b82f6;text-decoration:underline;}

  .rec-name.filter-trig.active{color:#3b82f6;}
  .filter-hint{font-size:11px;color:#9aa0a6;margin:2px 0 0;}

// depth 2 위치를 부모 셀 bbox 기준으로 해석하도록 포지셔너 패치 (스킬 권장)
if (VoronoiTreemapHelpers && VoronoiTreemapHelpers.createInitialPositioner) {
  const pip = (pt, poly) => { let inside=false;
    for (let a=0,b=poly.length-1;a<poly.length;b=a++){ const xi=poly[a][0],yi=poly[a][1],xj=poly[b][0],yj=poly[b][1];
      if ((yi>pt[1])!==(yj>pt[1]) && pt[0]<((xj-xi)*(pt[1]-yi))/(yj-yi)+xi) inside=!inside; } return inside; };
  VoronoiTreemapHelpers.createInitialPositioner = function (self, initialPositions) {
    return function (d, i, arr, sim) {
      const clip = sim.clip();
      let minx=Infinity,maxx=-Infinity,miny=Infinity,maxy=-Infinity;
      for (const p of clip){ if(p[0]<minx)minx=p[0]; if(p[0]>maxx)maxx=p[0]; if(p[1]<miny)miny=p[1]; if(p[1]>maxy)maxy=p[1]; }
      const cx=(minx+maxx)/2, cy=(miny+maxy)/2;
      if (d.depth===0) return [cx,cy];
      const pos = (initialPositions||[]).find(p => p.depth===d.depth && p.key===d.data?.key);
      if (pos){ for (const k of [1,0.7,0.45,0.25]){ const x=cx+(minx+pos.x*(maxx-minx)-cx)*k, y=cy+(miny+pos.y*(maxy-miny)-cy)*k; if (pip([x,y],clip)) return [x,y]; } }
      let x,y; do { x=minx+(maxx-minx)*sim.prng()(); y=miny+(maxy-miny)*sim.prng()(); } while(!pip([x,y],clip));
      return [x,y];
    };
  };
}

const pastel = (i) => `hsl(${(i*137.508)%360} 52% 78%)`;
const colorMapFor = keys => { const m={}; keys.forEach((k,i)=>m[k]=pastel(i)); return m; };

const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const panel = document.getElementById('panel');

function authorsStr(authors){
  if(!authors||!authors.length) return '';
  // 역할별 묶기
  const byRole={};
  authors.forEach(a=>{(byRole[a.role||'저자']=byRole[a.role||'저자']||[]).push(a.name);});
  return Object.entries(byRole).map(([role,names])=>`${esc(names.join(', '))} <span style="color:#9aa0a6;font-size:11px">${esc(role)}</span>`).join(' · ');
}

function showDetail(b){
  if(!b || !b.title){ return; }   // 그룹(대/중분류) 클릭 시 무시 — 책 셀만 표시
  const cover = b.cover ? `<img src="${esc(b.cover)}" alt="" onerror="this.style.display='none'">` : '';
  const sub = b.subtitle ? `<p class="bk-sub">${esc(b.subtitle)}</p>` : '';
  const cat = (b.category||[]).join(' › ');
  const recs = (b.recommenders||[]).map(r=>{
    const rv = r.review && r.review.trim()
      ? `<div class="rec-review">“${esc(r.review)}”</div>`
      : `<div class="rec-review empty">추천사 없음</div>`;
    return `<div class="rec">
      <div class="rec-name filter-trig" data-type="rec" data-val="${esc(r.name)}" title="이 추천인이 고른 책만 보기">${esc(r.name)}</div>
      <div class="rec-bio">${esc(r.bio)}</div>
      ${rv}
    </div>`;
  }).join('');
  panel.innerHTML = `
    <div class="bk-head">
      ${cover}
      <div style="min-width:0">
        <p class="bk-title">${esc(b.title)}</p>
        ${sub}
        <div class="bk-meta">
          ${authorsStr(b.authors)}<br>
          <b class="filter-trig" data-type="pub" data-val="${esc(b.publisher||'')}" title="이 출판사 책만 보기">${esc(b.publisher||'')}</b> · ${esc(b.pub_date||'')}
        </div>
      </div>
    </div>
    <div class="bk-cat">${esc(cat)}</div><br>
    <a class="bk-link" href="${esc(b.url)}" target="_blank" rel="noopener">교보문고에서 보기 ↗</a>
    <hr class="divider">
    <p class="rec-h">추천인 <span class="cnt">${(b.recommenders||[]).length}명</span></p>
    ${recs}`;
  panel.scrollTop = 0;
}

// path/text 요소 모두 __data__(계층노드) 보유 → 원본 도서 행 추출
function rowOf(el){
  const node = el && el.__data__;
  let r = node && node.data;
  if (r && !r.title && r.data && r.data.title) r = r.data;
  return r;
}

// 출판사·추천인은 그룹을 depth1로 → 라이브러리 기본 팔레트가 그룹별로 색을 구분.
// 임베딩 위치는 depth1 기준으로 적용.
const posD1 = arr => arr.map(p => ({ ...p, depth: 1 }));

const BASE_OPTS = {
  width: 1200, height: 900, maptitle: '2026 교보문고 인문교양대상 추천도서',
  value: 'bubbleSize', showMetaLabel: true, showLabel: true, labelMode: 'show',
  showPercent: false, pebble: true, clickFunc: () => {},
};
// 분류 뷰의 대분류별 색 (라이브러리 기본 팔레트). 추천인·출판사 셀을 이 색으로 칠해
// 한 사람/출판사가 여러 분야를 다루는지(다색) 한 분야에 집중하는지(단색) 보이게 한다.
// 분류 뷰의 대분류 색 (라이브러리 기본 팔레트). colorFunc는 nd.category[1](대분류)을 직접 읽어
// 추천인·출판사 셀을 도서 분야색으로 칠한다 → 한 사람/출판사의 분야 다양성이 색으로 드러남.
const catColorMap = {
  '정치/사회':'rgb(255,225,138)', '인문':'rgb(164,191,216)', '역사/문화':'rgb(162,187,155)',
  '만화':'rgb(246,213,146)', '과학':'rgb(245,147,128)', '소설':'rgb(252,180,125)',
  '시/에세이':'rgb(214,205,179)', '경제/경영':'rgb(180,203,210)'
};
const catColorFunc = (o, nd, def) => { const b = nd && nd.category && nd.category[1]; return (b && catColorMap[b]) || def; };

const VIEWS = {
  // 분류: 대분류·중분류·제목 라벨 모두 표시
  cat: { data: DATA,    levels: ['metaLabel','label','text'], positions: POS_CAT, caption: '대분류 › 중분류 › 도서 · 91종 (크기 = 추천받은 횟수)' },
  // 추천인·출판사: 그룹(depth1) + 제목(depth3), 셀 색은 책의 대분류(분류 뷰 색) 사용
  rec: { data: dataRec, levels: ['recommender','text'], positions: posD1(POS_REC), hideLeaf: true, colorFunc: catColorFunc,
         caption: '추천인 › 도서 · 평가위원 61인 · 셀 색 = 도서 분야(대분류)' },
  pub: { data: DATA,    levels: ['publisher','text'],   positions: posD1(POS_PUB), hideLeaf: true, colorFunc: catColorFunc,
         caption: '출판사 › 도서 · 63개 출판사 · 셀 색 = 도서 분야(대분류)' },
};

const DIM_COLOR = '#dcdee2';
let svg, bookCells, bookLabels, curFilter = null;

// 상세 표시 + 클릭 셀 하이라이트 (같은 책 인스턴스 모두)
function onSvgClick(e){
  const el = e.target.closest('path');
  const node = el && el.__data__;
  if (!node) return;
  let row = node.data;
  if (row && !row.title && row.data && row.data.title) row = row.data;
  if (!row || !row.title) return;
  showDetail(row);
  svg.querySelectorAll('path.cell-clicked').forEach(x => x.classList.remove('cell-clicked'));
  svg.querySelectorAll('path.rootArea').forEach(p => { const r = rowOf(p); if (r && r.url === row.url) p.classList.add('cell-clicked'); });
}

function renderView(mode){
  const v = VIEWS[mode];
  const opts = { ...BASE_OPTS, levels: v.levels, caption: v.caption };
  if (v.positions) opts.positions = v.positions;
  if (v.colorFunc) opts.colorFunc = v.colorFunc;
  const newSvg = new VoronoiTreemap().render(v.data, opts);
  document.getElementById('chart-container').replaceChildren(newSvg);
  svg = newSvg;
  // viewBox로 전환 → 컨테이너 폭에 맞춰 꽉 차게 스케일 (모바일). 캡션이 height(900) 아래(y=910)라
  // 실제 콘텐츠 bbox 높이로 viewBox를 잡아 캡션이 잘리지 않게 한다. 인라인 max-width(1200)도 해제.
  let vbH = (opts.height||900) + 34;
  try { const bb = newSvg.getBBox(); if (bb.height) vbH = Math.ceil(bb.y + bb.height) + 6; } catch(e) {}
  newSvg.setAttribute('viewBox', '0 0 ' + (opts.width||1200) + ' ' + vbH);
  newSvg.removeAttribute('width'); newSvg.removeAttribute('height');
  newSvg.style.maxWidth = 'none';
  bookCells  = [...svg.querySelectorAll('path.rootArea, path.textArea')].filter(p => { const r = rowOf(p); return r && r.title; });
  bookCells.forEach(p => { p._ofill = p.style.fill; });
  bookLabels = [...svg.querySelectorAll('text.text-item')].filter(t => { const r = rowOf(t); return r && r.title; });  // 보이는 제목(depth3)
  svg.querySelectorAll('text.percent-label').forEach(t => { t.style.display = 'none'; });   // 퍼센트는 노이즈 → 항상 숨김
  // 출판사·추천인은 제목이 depth2(label-item)·depth3(text-item)에 중복 → 중복인 depth2만 숨김(제목은 depth3로 1회 표시).
  // 분류는 label-item이 중분류라 그대로 둔다.
  if (v.hideLeaf) svg.querySelectorAll('text.label-item').forEach(t => { t.style.display = 'none'; });
  curFilter = null;
  svg.addEventListener('click', onSvgClick);
  document.querySelectorAll('.fb-tab').forEach(t => t.classList.toggle('active', t.dataset.dim===mode));
}

/* ── 출판사·추천인 이름 클릭 시 회색 강조(현재 뷰 기준) ── */
const MATCH = {
  cat: (r, v) => r.metaLabel === v,
  rec: (r, v) => (r.recommenders||[]).some(x => x.name === v),
  pub: (r, v) => r.publisher === v,
};
function applyFilter(type, val){
  const fn = MATCH[type]; if (!fn) return;
  bookCells.forEach(p => { const r = rowOf(p); p.style.fill = fn(r, val) ? p._ofill : DIM_COLOR; });
  bookLabels.forEach(t => { const r = rowOf(t); t.classList.toggle('dimmed-label', !fn(r, val)); });
  svg.classList.add('filtering');
  curFilter = { type, val };
}
function clearFilter(){
  if (bookCells) bookCells.forEach(p => { p.style.fill = p._ofill; });
  if (bookLabels) bookLabels.forEach(t => t.classList.remove('dimmed-label'));
  svg.classList.remove('filtering');
  panel.querySelectorAll('.filter-trig.active').forEach(e => e.classList.remove('active'));
  curFilter = null;
}
// 패널 내 출판사/추천인 클릭 → 회색 강조 (재클릭 시 해제)
panel.addEventListener('click', (e) => {
  const trig = e.target.closest('.filter-trig');
  if (!trig) return;
  e.stopPropagation();
  if (trig.classList.contains('active')) { clearFilter(); return; }
  applyFilter(trig.dataset.type, trig.dataset.val);
  panel.querySelectorAll('.filter-trig.active').forEach(x => x.classList.remove('active'));
  trig.classList.add('active');
});

/* ── 하단 토글: 분류 · 추천인 · 출판사 → 버블 묶음 기준 전환(재렌더링) ── */
document.getElementById('filterbar').addEventListener('click', (e) => {
  e.stopPropagation();
  const tab = e.target.closest('.fb-tab');
  if (tab) { renderView(tab.dataset.dim); return; }
  if (e.target.closest('#fbReset')) { clearFilter(); }
});

// 외부(버블·빈 영역) 클릭 → 회색 강조 해제
document.addEventListener('click', (e) => {
  if (e.target.closest('.filter-trig') || e.target.closest('#filterbar')) return;
  if (svg.classList.contains('filtering')) clearFilter();
});

renderView('cat');   // 기본: 분류 뷰
</script>
</body>
</html>
